name: lexilens
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  bloc: ^9.1.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  responsive_sizer: ^3.3.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.8.1
  camera: ^0.10.5+9
  image_picker: ^1.0.4
  google_mlkit_text_recognition: ^0.15.1
  flutter_tts: ^4.2.0   
  file_picker: ^10.3.8
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  http: ^1.6.0
  device_info_plus: ^12.3.0
  syncfusion_flutter_pdf: ^32.1.23
  image: ^4.7.2
  path_provider: ^2.1.5
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.6
  freezed: ^3.2.3
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/

  fonts:
    - family: OpenDyslexic
      fonts:
        - asset: assets/open-dyslexic.ttf
    - family: NotoSansDevanagari
      fonts:
        - asset: assets/NotoSansDevanagari-VariableFont_wdth,wght.ttf
